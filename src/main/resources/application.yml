spring:
  application:
    name: nemo
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nemo}
    username: ${DB_USERNAME:nemo}
    password: ${DB_PASSWORD:nemo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - account_email
              - profile_nickname
          google:
            client-name: Google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

app:
  cookie:
    secure: false
    same-site: Strict
    domain: localhost
  oauth:
    frontend-redirect-uri: ${APP_FRONTEND_URL:http://localhost:5173}/auth/callback
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./data/uploads}
    base-url: http://localhost:8080/files

cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:5174
    - http://localhost:3000

jwt:
  secret: ${JWT_SECRET}
  access-exp-sec: 900
  refresh-exp-sec: 604800

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  default-produces-media-type: application/json

logging:
  level:
    com.nemo.nemo.domain.sync: DEBUG
