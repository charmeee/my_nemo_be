# Test profile - overrides main application.yml for integration tests
JWT_SECRET: test-jwt-secret-key-for-testing-at-least-32-bytes!!
KAKAO_CLIENT_ID: test-kakao-client-id
KAKAO_CLIENT_SECRET: test-kakao-client-secret
GOOGLE_CLIENT_ID: test-google-client-id
GOOGLE_CLIENT_SECRET: test-google-client-secret

spring:
  flyway:
    enabled: false  # Schema already applied; skip migration in tests
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  tomcat:
    max-http-form-post-size: 20MB

# Test-specific rate limiting override: high limit so normal tests aren't blocked
app:
  cookie:
    secure: false
    same-site: Lax
    domain: localhost
